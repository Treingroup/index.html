<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0ede8;
    --text: #1a1a18; --text-muted: #6b6a66; --border: rgba(0,0,0,0.10);
    --accent: #1a1a18; --green: #2d6a4f; --green-bg: #eaf3de;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1e1c; --surface2: #2a2a27;
      --text: #f0ede8; --text-muted: #9a9893; --border: rgba(255,255,255,0.10);
      --accent: #f0ede8; --green: #9FE1CB; --green-bg: #085041;
    }
  }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { padding: 1.5rem 2rem; border-bottom: 0.5px solid var(--border); background: var(--surface); display: flex; align-items: baseline; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 400; letter-spacing: -0.5px; }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: 'Courier New', monospace; }
  .setup-card { max-width: 520px; margin: 3rem auto; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; }
  .setup-card h2 { font-size: 18px; font-weight: 400; margin-bottom: 0.4rem; }
  .setup-card .desc { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; font-family: 'Courier New', monospace; line-height: 1.6; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-family: 'Courier New', monospace; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-size: 14px; font-family: 'Courier New', monospace; outline: none; }
  .field input:focus { border-color: var(--text-muted); }
  .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; font-family: 'Georgia', serif; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg { background: #fcebeb; color: #a32d2d; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-family: 'Courier New', monospace; margin-top: 1rem; display: none; line-height: 1.5; }
  .progress-bar-wrap { margin-top: 1rem; display: none; }
  .progress-label { font-size: 12px; color: var(--text-muted); font-family: 'Courier New', monospace; margin-bottom: 6px; }
  .progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .dashboard { display: none; padding: 1.5rem 2rem; }
  .top-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
  .period-btn { padding: 6px 14px; border: 0.5px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s; }
  .period-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .product-badge { margin-left: auto; padding: 4px 12px; background: var(--surface2); border-radius: 20px; font-size: 12px; color: var(--text-muted); font-family: 'Courier New', monospace; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .metric-label { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 400; letter-spacing: -0.5px; }
  .metric-card.highlight .metric-value { color: var(--green); }
  .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: 'Courier New', monospace; }
  .chart-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .chart-title { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 1rem; }
  .table-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 1.25rem; text-align: left; font-weight: 400; color: var(--text-muted); font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; border-bottom: 0.5px solid var(--border); }
  td { padding: 11px 1.25rem; border-bottom: 0.5px solid var(--border); color: var(--text); font-family: 'Courier New', monospace; }
  tr:last-child td { border-bottom: none; }
  .reset-btn { background: none; border: 0.5px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-family: 'Courier New', monospace; cursor: pointer; }
  .watermark { text-align: center; padding: 2rem; font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; opacity: 0.4; }
  .empty-row td { text-align: center; color: var(--text-muted); padding: 2rem; }
  @media (max-width: 600px) { .metrics-grid { grid-template-columns: 1fr; } .dashboard { padding: 1rem; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Partner Dashboard</h1>
    <p id="header-sub">— configura l'accesso per iniziare</p>
  </div>
  <button class="reset-btn" id="reset-btn" style="display:none" onclick="resetConfig()">↩ riconfigura</button>
</div>

<div id="setup-section">
  <div class="setup-card">
    <h2>Configurazione accesso</h2>
    <p class="desc">Inserisci la Restricted API Key di Stripe (sola lettura) e il Product ID o Price ID del prodotto da monitorare.</p>
    <div class="field">
      <label>Stripe Restricted API Key</label>
      <input type="password" id="api-key" placeholder="rk_live_..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Product ID o Price ID</label>
      <input type="text" id="product-id" placeholder="prod_... oppure price_..." />
    </div>
    <div class="field">
      <label>Quota partner (%)</label>
      <input type="number" id="quota-pct" value="20" min="1" max="100" />
    </div>
    <div class="field">
      <label>Nome prodotto (etichetta)</label>
      <input type="text" id="product-label" placeholder="es. Corso Premium" />
    </div>
    <button class="btn-primary" id="load-btn" onclick="loadData()">Carica dati →</button>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-label" id="progress-label">Recupero pagamenti...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div class="dashboard" id="dashboard-section">
  <div class="top-bar">
    <button class="period-btn active" onclick="setPeriod(30, this)">30 giorni</button>
    <button class="period-btn" onclick="setPeriod(90, this)">90 giorni</button>
    <button class="period-btn" onclick="setPeriod(180, this)">6 mesi</button>
    <button class="period-btn" onclick="setPeriod(365, this)">12 mesi</button>
    <button class="period-btn" onclick="setPeriod(9999, this)">Tutto</button>
    <span class="product-badge" id="product-badge">—</span>
  </div>
  <div id="dashboard-content"></div>
</div>

<div class="watermark">Partner Dashboard — dati in tempo reale da Stripe</div>

<script>
let CONFIG = {};
let allPayments = [];
let chartInstance = null;
let currentDays = 30;

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function setProgress(pct, label) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

async function stripeGet(path) {
  const resp = await fetch('https://api.stripe.com/v1/' + path, {
    headers: { 'Authorization': 'Bearer ' + CONFIG.apiKey }
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

async function fetchAllPages(endpoint) {
  let results = [];
  let hasMore = true;
  let startingAfter = null;
  while (hasMore) {
    const sep = endpoint.includes('?') ? '&' : '?';
    const q = startingAfter ? endpoint + sep + 'limit=100&starting_after=' + startingAfter : endpoint + sep + 'limit=100';
    const data = await stripeGet(q);
    results = results.concat(data.data);
    hasMore = data.has_more;
    if (hasMore && data.data.length > 0) startingAfter = data.data[data.data.length - 1].id;
    if (results.length > 3000) break;
  }
  return results;
}

async function loadData() {
  document.getElementById('error-msg').style.display = 'none';
  const apiKey = document.getElementById('api-key').value.trim();
  const productId = document.getElementById('product-id').value.trim();
  const quotaPct = parseFloat(document.getElementById('quota-pct').value) || 20;
  const productLabel = document.getElementById('product-label').value.trim() || productId;

  if (!apiKey || !productId) { showError('Inserisci sia la API Key che il Product ID.'); return; }
  CONFIG = { apiKey, productId, quotaPct, productLabel };

  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  btn.textContent = 'Caricamento...';

  try {
    setProgress(10, 'Recupero prezzi del prodotto...');
    let priceIds = [];
    if (productId.startsWith('price_')) {
      priceIds = [productId];
    } else {
      const prices = await fetchAllPages('prices?product=' + productId);
      priceIds = prices.map(function(p) { return p.id; });
    }
    if (priceIds.length === 0) throw new Error('Nessun prezzo trovato. Verifica il Product ID su Stripe → Products.');

    setProgress(30, 'Ricerca fatture associate...');
    let payments = [];
    let invoiceIds = new Set();

    for (let i = 0; i < priceIds.length; i++) {
      setProgress(30 + Math.round((i / priceIds.length) * 40), 'Analisi prezzo ' + (i+1) + ' di ' + priceIds.length + '...');
      try {
        const items = await fetchAllPages('invoice_items?price=' + priceIds[i]);
        items.forEach(function(item) {
          if (item.invoice) {
            const id = typeof item.invoice === 'string' ? item.invoice : item.invoice.id;
            invoiceIds.add(id);
          }
        });
      } catch(e) {}
    }

    setProgress(75, 'Recupero dettagli pagamenti (' + invoiceIds.size + ' fatture)...');
    const ids = Array.from(invoiceIds);
    for (let i = 0; i < ids.length; i++) {
      if (i % 5 === 0) setProgress(75 + Math.round((i / Math.max(ids.length,1)) * 20), 'Fattura ' + (i+1) + ' di ' + ids.length + '...');
      try {
        const inv = await stripeGet('invoices/' + ids[i]);
        if (inv.status === 'paid' && inv.amount_paid > 0) {
          payments.push({
            id: inv.id,
            date: inv.status_transitions && inv.status_transitions.paid_at ? inv.status_transitions.paid_at : inv.created,
            amount: inv.amount_paid,
            currency: (inv.currency || 'eur').toUpperCase(),
            description: inv.number || inv.id
          });
        }
      } catch(e) {}
    }

    // Fallback: scan charges with metadata match
    if (payments.length === 0) {
      setProgress(80, 'Nessuna fattura trovata, analisi pagamenti diretti...');
      try {
        const charges = await fetchAllPages('charges');
        charges.forEach(function(c) {
          if (c.status !== 'succeeded') return;
          const meta = c.metadata || {};
          const vals = Object.values(meta).map(function(v) { return String(v); });
          if (vals.indexOf(productId) !== -1 || priceIds.some(function(pid) { return vals.indexOf(pid) !== -1; })) {
            payments.push({ id: c.id, date: c.created, amount: c.amount, currency: (c.currency || 'eur').toUpperCase(), description: c.description || c.id });
          }
        });
      } catch(e) {}
    }

    setProgress(100, 'Completato!');
    allPayments = payments.sort(function(a,b) { return b.date - a.date; });
    CONFIG.currency = payments.length > 0 ? payments[0].currency : 'EUR';

    setTimeout(function() {
      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('dashboard-section').style.display = 'block';
      document.getElementById('reset-btn').style.display = 'inline-block';
      document.getElementById('product-badge').textContent = productLabel;
      document.getElementById('header-sub').textContent = '— ' + productLabel;
      renderDashboard(currentDays);
    }, 500);

  } catch(e) {
    showError('Errore: ' + e.message);
    document.getElementById('progress-wrap').style.display = 'none';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Carica dati →';
  }
}

function filterByDays(payments, days) {
  if (days >= 9999) return payments;
  const cutoff = Date.now() / 1000 - days * 86400;
  return payments.filter(function(p) { return p.date >= cutoff; });
}

function fmt(cents, currency) {
  return new Intl.NumberFormat('it-IT', { style: 'currency', currency: currency || CONFIG.currency || 'EUR' }).format(cents / 100);
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function groupByMonth(payments) {
  const map = {};
  payments.forEach(function(p) {
    const d = new Date(p.date * 1000);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    map[key] = (map[key] || 0) + p.amount;
  });
  const sorted = Object.keys(map).sort();
  return { labels: sorted, values: sorted.map(function(k) { return map[k] / 100; }) };
}

function renderDashboard(days) {
  const filtered = filterByDays(allPayments, days);
  const totalCents = filtered.reduce(function(s,p) { return s + p.amount; }, 0);
  const total = totalCents / 100;
  const quota = total * (CONFIG.quotaPct / 100);
  const avg = filtered.length > 0 ? total / filtered.length : 0;
  const monthly = groupByMonth(filtered);
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const lineColor = isDark ? '#9FE1CB' : '#1a1a18';
  const fillColor = isDark ? 'rgba(159,225,203,0.10)' : 'rgba(26,26,24,0.06)';
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  const labelColor = isDark ? '#9a9893' : '#6b6a66';
  const periodLabel = days >= 9999 ? 'tutto il periodo' : 'ultimi ' + days + ' giorni';

  document.getElementById('dashboard-content').innerHTML =
    '<div class="metrics-grid">' +
      '<div class="metric-card"><div class="metric-label">Totale incassato</div><div class="metric-value">' + fmt(totalCents) + '</div><div class="metric-sub">' + filtered.length + ' pagamenti</div></div>' +
      '<div class="metric-card highlight"><div class="metric-label">Quota partner (' + CONFIG.quotaPct + '%)</div><div class="metric-value">' + fmt(quota * 100) + '</div><div class="metric-sub">' + periodLabel + '</div></div>' +
      '<div class="metric-card"><div class="metric-label">Valore medio</div><div class="metric-value">' + fmt(avg * 100) + '</div><div class="metric-sub">per transazione</div></div>' +
    '</div>' +
    '<div class="chart-section"><div class="chart-title">Andamento mensile</div><div style="position:relative;width:100%;height:200px;"><canvas id="revenue-chart"></canvas></div></div>' +
    '<div class="table-section"><div class="table-header">Pagamenti</div><table><thead><tr><th>Data</th><th>Riferimento</th><th>Importo</th><th>Quota ' + CONFIG.quotaPct + '%</th></tr></thead><tbody>' +
    (filtered.length === 0
      ? '<tr class="empty-row"><td colspan="4">Nessun pagamento trovato per questo prodotto</td></tr>'
      : filtered.slice(0,100).map(function(p) {
          return '<tr><td>' + fmtDate(p.date) + '</td><td style="font-size:11px;color:var(--text-muted);">' + p.description + '</td><td>' + fmt(p.amount, p.currency) + '</td><td style="color:var(--green);">' + fmt(Math.round(p.amount * CONFIG.quotaPct / 100), p.currency) + '</td></tr>';
        }).join('')
    ) +
    '</tbody></table></div>';

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (monthly.labels.length > 0) {
    chartInstance = new Chart(document.getElementById('revenue-chart'), {
      type: 'line',
      data: {
        labels: monthly.labels.map(function(l) {
          const parts = l.split('-');
          return new Date(parts[0], parts[1]-1).toLocaleDateString('it-IT', { month: 'short', year: '2-digit' });
        }),
        datasets: [{ data: monthly.values, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: lineColor, fill: true, tension: 0.3 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return fmt(ctx.parsed.y * 100); } } } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: labelColor, font: { family: 'Courier New', size: 11 } } },
          y: { grid: { color: gridColor }, ticks: { color: labelColor, font: { family: 'Courier New', size: 11 }, callback: function(v) { return fmt(v * 100); } } }
        }
      }
    });
  }
}

function setPeriod(days, btn) {
  currentDays = days;
  document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderDashboard(days);
}

function resetConfig() {
  CONFIG = {}; allPayments = [];
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('dashboard-section').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('header-sub').textContent = "— configura l'accesso per iniziare";
}
</script>
</body>
</html>
